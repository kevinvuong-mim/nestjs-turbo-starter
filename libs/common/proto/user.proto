syntax = "proto3";

package user;

service UserService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc GetUsers (GetUsersRequest) returns (GetUsersResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
  rpc FindUserByEmail (FindUserByEmailRequest) returns (UserResponse);
}

message UserResponse {
  string id = 1;
  string email = 2;
  string firstName = 3;
  string lastName = 4;
  string fullName = 5;
  bool isActive = 6;
  bool emailVerified = 7;
  string role = 8;
  string password = 9;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string firstName = 3;
  string lastName = 4;
  string fullName = 5;
  string dateOfBirth = 6;
  string gender = 7;
  string phoneNumber = 8;
  string avatar = 9;
  bool isActive = 10;
  string role = 11;
}

message GetUserRequest {
  string id = 1;
  string email = 2;
}

message GetUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search = 3;
}

message GetUsersResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
}

message UpdateUserRequest {
  string id = 1;
  string firstName = 2;
  string lastName = 3;
  string fullName = 4;
  string dateOfBirth = 5;
  string gender = 6;
  string phoneNumber = 7;
  string avatar = 8;
  bool isActive = 9;
  string password = 10;
  string passwordChangedAt = 11;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string id = 2;
  string message = 3;
}

message FindUserByEmailRequest {
  string email = 1;
}